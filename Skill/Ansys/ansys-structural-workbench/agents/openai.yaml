interface:
  display_name: "ANSYS Structural Workbench"
  short_description: "Plan, mesh, solve, and validate ANSYS structures"
  default_prompt: "Use $ansys-structural-workbench to run a validated structural analysis through the Workbench MCP."
dependencies:
  tools:
    - type: "mcp"
      value: "ansys-workbench"
      description: "Local stdio MCP server for ANSYS Workbench and Mechanical automation"
      transport: "stdio"
policy:
  allow_implicit_invocation: false
