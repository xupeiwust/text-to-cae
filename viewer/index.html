<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Run and inspect local Abaqus Text-to-CAE examples" />
    <title>Text to CAE</title>
    <script>
      (function () {
        const root = document.documentElement;
        root.dataset.themePreference = "dark";
        root.dataset.theme = "dark";
        root.classList.add("dark");
        root.style.colorScheme = "dark";
        try {
          window.localStorage.setItem("text-to-cae-theme", "dark");
        } catch (_) {
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
